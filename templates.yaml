- sensor:
    - name: "Essent Prices Active"
      unique_id: essent_prices_active
      icon: mdi:database-check
      state: >
        {% if states('sensor.essent_prices_cache') == 'ok' %}
          valid
        {% else %}
          empty
        {% endif %}
      attributes:
        last_updated: >
          {{ states.sensor.essent_prices_cache.last_changed | as_timestamp | timestamp_local }}

    - name: "Essent Electricity Price Now"
      unique_id: essent_electricity_price_now
      unit_of_measurement: "€/kWh"
      state_class: measurement
      icon: mdi:lightning-bolt
      availability: "{{ states('sensor.essent_prices_cache') == 'ok' }}"
      state: >
        {{ state_attr('sensor.essent_prices_cache', 'electricity')['current']['total'] | float(0) }}

    - name: "Essent Electricity Price Now (ex VAT)"
      unique_id: essent_electricity_price_now_ex
      unit_of_measurement: "€/kWh"
      state_class: measurement
      icon: mdi:lightning-bolt-outline
      availability: "{{ states('sensor.essent_prices_cache') == 'ok' }}"
      state: >
        {{ state_attr('sensor.essent_prices_cache', 'electricity')['current']['total_ex'] | float(0) }}

